<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultation Status</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Consultation Status</h1>
        <nav>
            <a href="user_dashboard.html">Back to Dashboard</a>
        </nav>
    </header>

    <main class="status-container">
        <h2>Your Consultation Requests</h2>
        <table border="1">
            <thead>
                <tr>
                    <th>Symptoms</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="status-table">
                <!-- Data will be inserted here -->
            </tbody>
        </table>
    </main>

    <script>
        function loadConsultationStatus() {
            fetch('fetch_consultation_status.php')
                .then(response => response.text())
                .then(data => {
                    document.getElementById("status-table").innerHTML = data;
                })
                .catch(error => console.error('Error fetching consultation status:', error));
        }

        loadConsultationStatus();
    </script>
</body>
</html>
