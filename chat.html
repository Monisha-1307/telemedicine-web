<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Patient</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .chat-container {
            width: 50%;
            margin: 50px auto;
            background: white;
            padding: 20px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        #chat-box {
            height: 300px;
            overflow-y: scroll;
            border: 1px solid #ddd;
            padding: 10px;
            background: #fff;
            margin-bottom: 10px;
        }
        .chat-input {
            display: flex;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            margin-left: 10px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <h2>Chat with Patient</h2>
        <input type="hidden" id="receiver_id" value="PATIENT_ID">
        <div id="chat-box"></div>
        <div class="chat-input">
            <input type="text" id="message" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        function sendMessage() {
            let receiver_id = document.getElementById("receiver_id").value;
            let message = document.getElementById("message").value;

            if (message.trim() === "") return;

            fetch('send_message.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `receiver_id=${receiver_id}&message=${encodeURIComponent(message)}`
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    document.getElementById("message").value = '';
                    loadMessages();
                }
            });
        }

        function loadMessages() {
            let receiver_id = document.getElementById("receiver_id").value;

            fetch(`fetch_messages.php?contact_id=${receiver_id}`)
                .then(response => response.json())
                .then(data => {
                    let chatBox = document.getElementById("chat-box");
                    chatBox.innerHTML = "";
                    data.forEach(msg => {
                        let sender = msg.sender_id == receiver_id ? "Doctor" : "You";
                        let messageElement = `<p><strong>${sender}:</strong> ${msg.message}</p>`;
                        chatBox.innerHTML += messageElement;
                    });
                    chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to latest message
                });
        }

        setInterval(loadMessages, 3000);
    </script>

</body>
</html>
